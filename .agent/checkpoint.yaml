  1. `apps/stage` 的运行态验收以 workspace 包最新 `dist` 为真
  2. 默认使用根命令 `pnpm dev:stage` 进行预览；若改动 `packages/tokens/src`，必须遵守 `tokens build -> components build -> stage 验证` 的顺序，不得并行构建 `tokens/components`
  3. 展示类 `Form` 的变体命名统一使用“通栏 / 卡片”，代码命名统一使用 `flush / card`；旧 `carded` 语义继续保持兼容映射
