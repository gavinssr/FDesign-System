  已确认治理约束：
  1. TypeScript 仍是 token 与组件合同的主源；Web CSS variables 仅作镜像输出
  2. 组件样式值优先来自本项目全局 token；若当前 token 暂无对应项，必须先询问用户确认，才可临时使用硬编码或 reference token，并在当前任务收尾前完成语义抽取与回灌
  3. 排版协议不保留 `600 / 700` 字重，也不再保留设计系统通用 `Text` 组件
