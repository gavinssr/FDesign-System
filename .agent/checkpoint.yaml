  11. 公共组件 H5 主路径已确认为“可控 Web DOM 优先”路线；所有可交互元素必须先保证真实 DOM、状态 class、ARIA 语义与样式命中点由组件自持，不能把覆盖 Taro / weui 内层样式作为长期方案
