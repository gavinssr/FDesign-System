  5. Web DOM 路线优先级高于历史 provisional 实现；Form 输入类 / 行动类后续新增真实交互组件时，必须按该路线先定义真实交互结构，再做视觉与平台适配
  6. stage 只负责暴露组件 hover `pointer` 是否真实成立；新增组件若缺少原生语义、真实节点或组件本体 cursor，应优先修组件，不再新增 stage 命中规则兜底
