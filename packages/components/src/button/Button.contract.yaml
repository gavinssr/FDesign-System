component: Button
purpose: "通用交互按钮，已按 Phase 5 Figma 规范对齐 primary-fill / primary-outline / secondary-outline"
provisional: false
platform_notes:
  h5: "默认渲染为 Taro View/Text，并映射 onPress 到点击事件"
  rn: "需要 TouchableOpacity adapter（Phase 4 实现）"
  weex: "不在主路径，需要 adapter 桥接（Phase 4 评估）"
layout_notes:
  - "Base Button 全部尺寸使用固定高度，不依赖内容把按钮纵向撑高"
  - "`xl` 宽度固定为 355px；`l` 宽度约束在 178px-327px 范围内，默认展示上限为 327px"
  - "`xl / l / m` 在 block 等流式场景下，横向 padding 允许从默认值收缩到最小安全留白"
forbidden:
  - "不允许传入业务特有的 icon 集合"
  - "不允许在 Button 内部处理路由跳转"
  - "不允许硬编码颜色值，必须使用 @fdesign/tokens"
a11y:
  - "disabled 时设置 aria-disabled=true"
  - "loading 时展示可访问的加载状态文案"
slots:
  children: "按钮文字或图标内容"
states:
  - default
  - inactive
  - hover
  - pressed
  - disabled
  - loading
