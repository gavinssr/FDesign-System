component: Input
purpose: "基础文本输入框，支持标签、帮助信息和校验状态"
provisional: true
platform_notes:
  h5: "通过 Taro Input 暴露输入事件，并统一映射为 onValueChange"
forbidden:
  - "不允许在 Input 内部直接发起表单提交"
  - "不允许硬编码颜色值，必须使用 @fdesign/tokens"
a11y:
  - "invalid 时设置 aria-invalid=true"
  - "disabled 时设置 aria-disabled=true"
slots: {}
states:
  - default
  - disabled
  - invalid
